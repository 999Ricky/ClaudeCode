<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Szyba Prywatyzująca 360 — Prezentacja Produktu</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: linear-gradient(145deg, #0a0a1a 0%, #1a1a3e 40%, #0d0d2b 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
    overflow: hidden;
    perspective: 1200px;
  }

  /* Ambient light particles */
  .particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .particle {
    position: absolute;
    width: 3px;
    height: 3px;
    background: rgba(100, 140, 255, 0.3);
    border-radius: 50%;
    animation: drift 8s ease-in-out infinite;
  }
  @keyframes drift {
    0%, 100% { transform: translateY(0) translateX(0); opacity: 0.2; }
    50% { transform: translateY(-80px) translateX(30px); opacity: 0.6; }
  }

  .scene {
    position: relative;
    width: 600px;
    height: 750px;
    transform-style: preserve-3d;
    transform: rotateX(18deg) rotateY(-22deg) rotateZ(2deg);
    z-index: 1;
  }

  /* Glow backdrop */
  .glow {
    position: absolute;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(80, 120, 255, 0.15) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    filter: blur(40px);
    z-index: 0;
  }

  /* ==================== APPLICATOR (top) ==================== */
  .applicator {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    animation: float-up 3.5s ease-in-out infinite;
    z-index: 30;
    filter: drop-shadow(0 15px 30px rgba(0,0,0,0.5));
  }
  @keyframes float-up {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(-18px); }
  }

  .applicator-body {
    width: 200px;
    height: 220px;
    position: relative;
  }

  /* Applicator frame */
  .app-frame {
    position: absolute;
    inset: 0;
    border: 3px solid #555;
    border-radius: 18px;
    background: linear-gradient(135deg, #2a2a2a 0%, #3a3a3a 30%, #222 100%);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.1),
      inset 0 -1px 0 rgba(0,0,0,0.3),
      0 0 20px rgba(100,140,255,0.1);
  }

  /* Applicator inner cutout */
  .app-cutout {
    position: absolute;
    top: 20px;
    left: 20px;
    right: 20px;
    bottom: 20px;
    border: 2px solid #444;
    border-radius: 12px;
    background: linear-gradient(180deg, #1a1a1a 0%, #111 100%);
  }

  /* Applicator alignment guides */
  .app-guide {
    position: absolute;
    background: #4a9eff;
    border-radius: 2px;
    opacity: 0.6;
  }
  .app-guide.top { top: 12px; left: 50%; transform: translateX(-50%); width: 40px; height: 2px; }
  .app-guide.bottom { bottom: 12px; left: 50%; transform: translateX(-50%); width: 40px; height: 2px; }
  .app-guide.left-g { left: 12px; top: 50%; transform: translateY(-50%); width: 2px; height: 40px; }
  .app-guide.right-g { right: 12px; top: 50%; transform: translateY(-50%); width: 2px; height: 40px; }

  /* Applicator handles/tabs */
  .app-tab {
    position: absolute;
    width: 50px;
    height: 16px;
    background: linear-gradient(180deg, #444 0%, #333 100%);
    border-radius: 0 0 8px 8px;
    left: 50%;
    transform: translateX(-50%);
    bottom: -16px;
    border: 2px solid #555;
    border-top: none;
  }

  .app-label {
    position: absolute;
    bottom: -45px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(200, 215, 255, 0.7);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* ==================== iPHONE (middle) ==================== */
  .iphone {
    position: absolute;
    top: 260px;
    left: 50%;
    transform: translateX(-50%);
    animation: float-mid 4s ease-in-out infinite;
    z-index: 20;
    filter: drop-shadow(0 25px 50px rgba(0,0,0,0.6));
  }
  @keyframes float-mid {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(-12px); }
  }

  .iphone-body {
    width: 200px;
    height: 420px;
    position: relative;
  }

  /* Phone chassis */
  .phone-frame {
    position: absolute;
    inset: 0;
    border-radius: 32px;
    background: linear-gradient(145deg, #2c2c2e 0%, #1c1c1e 50%, #0a0a0a 100%);
    border: 2px solid #3a3a3c;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.08),
      0 0 0 1px rgba(0,0,0,0.5),
      0 2px 20px rgba(0,0,0,0.4);
  }

  /* Titanium side band */
  .phone-band {
    position: absolute;
    inset: -1px;
    border-radius: 33px;
    border: 1.5px solid transparent;
    background: linear-gradient(180deg, rgba(120,120,130,0.3) 0%, rgba(60,60,65,0.1) 50%, rgba(120,120,130,0.2) 100%) border-box;
    -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
    mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }

  /* Screen */
  .phone-screen {
    position: absolute;
    top: 8px;
    left: 8px;
    right: 8px;
    bottom: 8px;
    border-radius: 26px;
    overflow: hidden;
    background: #000;
  }

  /* Screen content — gradient wallpaper */
  .screen-content {
    width: 100%;
    height: 100%;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(120, 80, 220, 0.8) 0%, transparent 50%),
      radial-gradient(ellipse at 70% 60%, rgba(30, 100, 220, 0.7) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 90%, rgba(200, 60, 150, 0.5) 0%, transparent 50%),
      linear-gradient(180deg, #1a0a2e 0%, #0a1628 100%);
    display: flex;
    flex-direction: column;
    padding: 16px;
    position: relative;
    animation: screen-glow 5s ease-in-out infinite alternate;
  }
  @keyframes screen-glow {
    0% { filter: brightness(0.95); }
    100% { filter: brightness(1.05); }
  }

  /* Dynamic Island */
  .dynamic-island {
    width: 90px;
    height: 26px;
    background: #000;
    border-radius: 20px;
    margin: 0 auto 20px;
    position: relative;
    box-shadow: 0 0 0 1px rgba(50,50,50,0.3);
  }
  .dynamic-island::after {
    content: '';
    position: absolute;
    width: 8px;
    height: 8px;
    background: radial-gradient(circle, #1a1a2e 40%, #000 60%);
    border-radius: 50%;
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
  }

  /* Clock */
  .screen-clock {
    color: #fff;
    font-size: 52px;
    font-weight: 200;
    text-align: center;
    letter-spacing: -1px;
    margin-top: 30px;
    text-shadow: 0 0 20px rgba(255,255,255,0.1);
  }
  .screen-date {
    color: rgba(255,255,255,0.7);
    font-size: 13px;
    font-weight: 400;
    text-align: center;
    margin-top: 4px;
    letter-spacing: 0.5px;
  }

  /* Side buttons */
  .btn-side {
    position: absolute;
    background: linear-gradient(180deg, #4a4a4c 0%, #2c2c2e 100%);
    border-radius: 2px;
  }
  .btn-power {
    right: -3px;
    top: 110px;
    width: 3px;
    height: 55px;
  }
  .btn-vol-up {
    left: -3px;
    top: 100px;
    width: 3px;
    height: 35px;
  }
  .btn-vol-down {
    left: -3px;
    top: 145px;
    width: 3px;
    height: 35px;
  }
  .btn-action {
    left: -3px;
    top: 68px;
    width: 3px;
    height: 18px;
  }

  /* Camera bump */
  .camera-module {
    display: none; /* Hidden in this angle view since we see the front */
  }

  /* ==================== PRIVACY GLASS (bottom) ==================== */
  .glass {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    animation: float-down 3.8s ease-in-out infinite;
    z-index: 10;
    filter: drop-shadow(0 20px 40px rgba(0,0,0,0.5));
  }
  @keyframes float-down {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(-15px); }
  }

  .glass-body {
    width: 190px;
    height: 410px;
    position: relative;
  }

  /* Glass pane */
  .glass-pane {
    position: absolute;
    inset: 0;
    border-radius: 28px;
    background: linear-gradient(
      135deg,
      rgba(40, 50, 80, 0.7) 0%,
      rgba(60, 70, 100, 0.5) 20%,
      rgba(30, 35, 55, 0.8) 40%,
      rgba(50, 60, 90, 0.4) 60%,
      rgba(35, 40, 65, 0.7) 80%,
      rgba(45, 55, 85, 0.6) 100%
    );
    border: 1.5px solid rgba(100, 130, 200, 0.3);
    box-shadow:
      inset 0 0 30px rgba(60, 80, 140, 0.15),
      inset 0 1px 0 rgba(255,255,255,0.1),
      0 0 15px rgba(80, 100, 180, 0.1);
    overflow: hidden;
  }

  /* Privacy filter lines */
  .privacy-lines {
    position: absolute;
    inset: 0;
    border-radius: 28px;
    overflow: hidden;
    opacity: 0.25;
  }
  .privacy-lines::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      90deg,
      transparent 0px,
      transparent 1.5px,
      rgba(0, 0, 0, 0.6) 1.5px,
      rgba(0, 0, 0, 0.6) 2px
    );
  }

  /* Glass reflection */
  .glass-reflection {
    position: absolute;
    top: -10%;
    left: -20%;
    width: 60%;
    height: 120%;
    background: linear-gradient(
      135deg,
      transparent 40%,
      rgba(150, 180, 255, 0.08) 45%,
      rgba(200, 220, 255, 0.12) 50%,
      transparent 55%
    );
    transform: rotate(15deg);
    animation: shine 4s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes shine {
    0%, 100% { transform: rotate(15deg) translateX(-10px); opacity: 0.8; }
    50% { transform: rotate(15deg) translateX(10px); opacity: 1; }
  }

  /* Notch cutout in glass */
  .glass-notch {
    position: absolute;
    top: 6px;
    left: 50%;
    transform: translateX(-50%);
    width: 85px;
    height: 22px;
    background: rgba(20, 25, 40, 0.6);
    border-radius: 0 0 16px 16px;
  }

  .glass-label {
    position: absolute;
    bottom: -35px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(200, 215, 255, 0.7);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* ==================== LABELS ==================== */
  .product-title {
    position: fixed;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 100;
  }
  .product-title h1 {
    color: #fff;
    font-size: 28px;
    font-weight: 600;
    letter-spacing: 1px;
    margin-bottom: 6px;
    text-shadow: 0 2px 20px rgba(80, 120, 255, 0.3);
  }
  .product-title p {
    color: rgba(180, 195, 230, 0.6);
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* Connection lines */
  .connector {
    position: absolute;
    left: 50%;
    width: 1px;
    background: linear-gradient(180deg, rgba(80,120,255,0.3) 0%, rgba(80,120,255,0) 100%);
    z-index: 5;
  }
  .connector-top {
    top: 240px;
    height: 25px;
    animation: pulse-line 3s ease-in-out infinite;
  }
  .connector-bottom {
    top: 680px;
    height: 25px;
    background: linear-gradient(180deg, rgba(80,120,255,0) 0%, rgba(80,120,255,0.3) 100%);
    animation: pulse-line 3s ease-in-out infinite 1.5s;
  }
  @keyframes pulse-line {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.8; }
  }

  /* Floating arrows */
  .arrow {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    opacity: 0.4;
  }
  .arrow svg {
    width: 16px;
    height: 16px;
  }
  .arrow-down-1 {
    top: 243px;
    animation: arrow-bounce 2s ease-in-out infinite;
  }
  .arrow-down-2 {
    top: 683px;
    animation: arrow-bounce 2s ease-in-out infinite 0.5s;
  }
  @keyframes arrow-bounce {
    0%, 100% { transform: translateX(-50%) translateY(0); opacity: 0.2; }
    50% { transform: translateX(-50%) translateY(5px); opacity: 0.6; }
  }

  /* Shadow on "ground" */
  .ground-shadow {
    position: absolute;
    bottom: -20px;
    left: 50%;
    transform: translateX(-50%);
    width: 250px;
    height: 30px;
    background: radial-gradient(ellipse, rgba(0,0,0,0.4) 0%, transparent 70%);
    filter: blur(10px);
    z-index: 0;
  }
</style>
</head>
<body>

<!-- Ambient particles -->
<div class="particles">
  <div class="particle" style="left:10%;top:20%;animation-delay:0s;"></div>
  <div class="particle" style="left:25%;top:60%;animation-delay:1.2s;"></div>
  <div class="particle" style="left:75%;top:30%;animation-delay:2.4s;"></div>
  <div class="particle" style="left:85%;top:70%;animation-delay:3.6s;"></div>
  <div class="particle" style="left:50%;top:80%;animation-delay:4.8s;"></div>
  <div class="particle" style="left:15%;top:85%;animation-delay:0.8s;"></div>
  <div class="particle" style="left:60%;top:15%;animation-delay:2s;"></div>
  <div class="particle" style="left:90%;top:50%;animation-delay:3.2s;"></div>
  <div class="particle" style="left:35%;top:40%;animation-delay:1.6s;"></div>
  <div class="particle" style="left:70%;top:90%;animation-delay:4s;"></div>
</div>

<div class="scene">
  <div class="glow"></div>

  <!-- APPLICATOR -->
  <div class="applicator">
    <div class="applicator-body">
      <div class="app-frame"></div>
      <div class="app-cutout"></div>
      <div class="app-guide top"></div>
      <div class="app-guide bottom"></div>
      <div class="app-guide left-g"></div>
      <div class="app-guide right-g"></div>
      <div class="app-tab"></div>
    </div>
    <div class="app-label">Aplikator</div>
  </div>

  <!-- Connector arrow -->
  <div class="connector connector-top"></div>
  <div class="arrow arrow-down-1">
    <svg viewBox="0 0 16 16" fill="none">
      <path d="M8 2 L8 14 M3 9 L8 14 L13 9" stroke="rgba(100,150,255,0.8)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <!-- iPHONE 15 PRO -->
  <div class="iphone">
    <div class="iphone-body">
      <div class="phone-frame"></div>
      <div class="phone-band"></div>
      <div class="btn-power"></div>
      <div class="btn-vol-up"></div>
      <div class="btn-vol-down"></div>
      <div class="btn-action"></div>
      <div class="phone-screen">
        <div class="screen-content">
          <div class="dynamic-island"></div>
          <div class="screen-clock">12:36</div>
          <div class="screen-date">Środa, 2 kwietnia</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Connector arrow -->
  <div class="connector connector-bottom"></div>
  <div class="arrow arrow-down-2">
    <svg viewBox="0 0 16 16" fill="none">
      <path d="M8 2 L8 14 M3 9 L8 14 L13 9" stroke="rgba(100,150,255,0.8)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <!-- PRIVACY GLASS -->
  <div class="glass">
    <div class="glass-body">
      <div class="glass-pane"></div>
      <div class="privacy-lines"></div>
      <div class="glass-reflection"></div>
      <div class="glass-notch"></div>
    </div>
    <div class="glass-label">Szyba Prywatyzująca 360°</div>
  </div>

  <div class="ground-shadow"></div>
</div>

<!-- Product title -->
<div class="product-title">
  <h1>Privacy Glass 360&deg;</h1>
  <p>Ochrona prywatności &bull; Perfekcyjny montaż</p>
</div>

</body>
</html>
